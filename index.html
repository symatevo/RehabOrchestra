<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Vite replaces %BASE_URL% (dev `/`, prod `/RehabOrchestra/). Fixes document.baseURI for publicUrl(). -->
    <base href="%BASE_URL%" />
    <script>
      (function () {
        try {
          var hn = location.hostname || "";
          if (!(hn.endsWith(".github.io") || hn === "github.io")) return;
          var segments = location.pathname.split("/").filter(Boolean);
          if (segments.length >= 1)
            window.__REHAB_PUBLIC_BASE__ = "/" + segments[0] + "/";
        } catch (_) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <title>Mirror Rehab</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
